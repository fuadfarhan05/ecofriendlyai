<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Eco Impact</title>
  <link rel="stylesheet" href="share.css">
</head>
<body>
  <div class="scene">

    <div class="phone-card" id="phoneCard">
      <div class="card-body">
        <div class="avatar-zone" id="avatarZone" title="Click to add photo">
          <div class="avatar-ring">
            <img class="avatar-img" id="avatarImg" alt="" style="display:none">
            <div class="avatar-empty" id="avatarEmpty">
              <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="15" r="7" fill="currentColor" opacity="0.55"/>
                <path d="M4 38c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
              </svg>
              <span>Add Photo</span>
            </div>
          </div>
          <input type="file" id="photoInput" accept="image/*">
        </div>

        <div class="glow-orb"></div>

        <div class="statement">
          <p class="pre-text">I conserved a total of</p>
          <p class="amount" id="amount">— ml</p>
          <p class="post-text">of water</p>
        </div>

        <p class="sub-text">using AI</p>

        <div class="bottles-row" id="bottlesRow">
          <span class="dot"></span>
          <span id="bottlesText">calculating…</span>
        </div>
      </div>

      <div class="card-footer">
        <span class="footer-brand">eco AI</span>
        <span class="footer-date" id="footerDate"></span>
      </div>
    </div>

    <p class="hint">Screenshot the card above to share your impact</p>
  </div>

  <script src="share.js"></script>
</body>
</html>
