<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-header">
    <div class="water-tracker">
      <svg viewBox="0 0 80 80" width="80" height="80" style="display:block;">
        <circle cx="40" cy="40" r="33" fill="none" stroke="#1a3a22" stroke-width="5"/>
        <circle cx="40" cy="40" r="33" fill="none" stroke="#38bdf8" stroke-width="5"
                stroke-dasharray="207.3" stroke-dashoffset="207.3"
                stroke-linecap="round"
                transform="rotate(-90 40 40)"
                id="water-ring"/>
        <rect x="36" y="19" width="8" height="5" rx="1.5" fill="#38bdf8"/>
        <polygon points="36,24 30,30 50,30 44,24" fill="#38bdf8" opacity="0.75"/>
        <rect x="30" y="30" width="20" height="29" rx="6" fill="none" stroke="#38bdf8" stroke-width="2"/>
        <line x1="35" y1="34" x2="35" y2="56" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
      </svg>
      <div class="water-label">Water Saved</div>
      <div class="water-ml" id="water-ml">0 ml</div>
    </div>
  </div>
  <div class="dashboard">
    <div class="dash-title">Impact Dashboard</div>
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-label">Tokens Saved</div>
        <div class="dash-value" id="stat-tokens">0</div>
      </div>
      <div class="dash-card">
        <div class="dash-label">Retries Avoided</div>
        <div class="dash-value" id="stat-retries">0</div>
      </div>
      <div class="dash-card">
        <div class="dash-label">Avg Input Cut</div>
        <div class="dash-value" id="stat-avgcut">0%</div>
      </div>
      <div class="dash-card">
        <div class="dash-label">Energy Saved</div>
        <div class="dash-value" id="stat-energy">0 Wh</div>
      </div>
    </div>
  </div>

  <div class="popup-body">
    <div class="toggle-row">
      <span class="toggle-label">Green Mode</span>
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
    </div>
    <p class="status-text" id="status">Inactive</p>

    <button class="share-btn" id="share">
      Share your impact
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
